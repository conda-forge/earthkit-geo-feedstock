{% set name = "earthkit-geo" %}
{% set version = "0.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 7aeb989abd97f06de9fd870676ddec97e215b91cf80cc225c4b2198878940b38

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - pytest-runner
  run:
    - python >={{ python_min }}
    - scipy

test:
  requires:
    - python {{ python_min }}
  imports:
    - earthkit.geo

about:
  home: https://github.com/ecmwf/earthkit-geo
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Geospatial computation library.
  dev_url: https://github.com/ecmwf/earthkit-geo

extra:
  recipe-maintainers:
    - iainrussell
    - sandorkertesz
    - pmaciel
